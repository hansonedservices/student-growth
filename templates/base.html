<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Student Growth Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Student Growth Tracker
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/upload" class="nav-link {% if request.path.startswith('/upload') %}active{% endif %}">Upload CSV</a>
    </div>
  </nav>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
